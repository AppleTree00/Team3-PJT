<!DOCTYPE html>

<html class="scroll-smooth" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta property="og:title" content="제출관리 - a4u">
<meta property="og:description" content="AI 기반 이력서 작성 및 경력 관리 솔루션">
<meta property="og:image" content="/og-image.png">
<meta property="og:type" content="website">
<!-- [수정 2026-06-25] 페이지 제목: 대시보드 → 제출관리 (네비 메뉴 재정의 반영) -->
<!-- [이전 코드] <title>a4u - 대시보드</title> -->
<title>a4u - 제출관리</title>
{% include '_head.html' %}
</head>
<body class="bg-surface-gray text-on-surface font-body-md overflow-x-hidden">
<!-- TopNavBar -->
{% include '_navbar.html' %}
<main class="pt-24 pb-12 px-margin-mobile md:px-margin-desktop max-w-max-width mx-auto">

<!-- [수정 2026-06-25] 제출관리 페이지: 이력서 그룹 제거(→이력서관리 메뉴로 분리), 지원·면접만 유지 -->

<!-- 페이지 헤더 -->
<section class="mb-8">
    <h1 class="font-headline-lg text-headline-lg text-on-background mb-1">제출관리</h1>
    <p class="font-body-md text-body-md text-on-surface-variant">지원 현황과 면접 일정을 한눈에 확인하세요.</p>
</section>

<!-- [이전 코드] Welcome Section + 이력서 그룹 — 이력서 관련 카드 제거 (2026-06-25)
<section class="mb-8 flex items-center justify-between flex-wrap gap-4">
    환영 문구 / 새 이력서 작성 버튼
</section>
<section class="mb-10">
    이력서 경쟁력 카드 / 최근 이력서 목록
</section>
-->

<!-- ══ 지원 · 면접 ═══════════════════════════════════════════════════════ -->
<section>
    <h2 class="font-label-md text-on-surface-variant uppercase tracking-widest mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-[16px] text-primary">work</span>
        지원 · 면접
    </h2>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-gutter">

        <!-- 지원 현황 칸반 (2/3) -->
        <div class="lg:col-span-2">
            <div class="flex justify-between items-center mb-4">
                <span class="font-label-md text-on-surface-variant">지원 현황</span>
                <div class="flex items-center gap-2">
                    <button class="p-1.5 text-on-surface-variant hover:bg-surface-container-low rounded-full transition-colors"><span class="material-symbols-outlined text-[18px]">filter_list</span></button>
                    <button id="btn-add-application" class="px-3 py-1.5 bg-primary text-on-primary rounded-full font-label-md text-xs hover:opacity-90 transition-all flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">add</span> 새로 추가
                    </button>
                </div>
            </div>

            <!-- [수정 2026-06-25] 지원현황 칸반 보드: 하드코딩 샘플 제거, API 연동으로 교체 -->
            <!-- [이전 코드 주석 - 하드코딩 샘플 시작]
            <div class="grid grid-cols-1 md:grid-cols-3 gap-gutter">...</div>
            [이전 코드 주석 - 하드코딩 샘플 끝] -->

            <div id="kanban-loading" class="flex items-center justify-center py-12 text-on-surface-variant">
                <span class="material-symbols-outlined animate-spin mr-2">progress_activity</span>
                <span>지원 현황을 불러오는 중...</span>
            </div>
            <div id="kanban-empty" class="hidden text-center py-12">
                <span class="material-symbols-outlined text-5xl text-outline-variant mb-4 block">inbox</span>
                <p class="font-label-md text-on-surface-variant mb-2">아직 등록된 지원 현황이 없습니다.</p>
                <p class="text-body-sm text-on-surface-variant">이력서를 작성하고 지원을 시작해보세요!</p>
            </div>
            <div id="kanban-board" class="hidden grid grid-cols-1 md:grid-cols-4 gap-gutter">
                <div class="bg-surface-container-low rounded-xl p-4 space-y-3">
                    <h3 class="font-label-md text-on-surface-variant px-2 text-sm">초안 <span id="count-draft">(0)</span></h3>
                    <div id="col-draft" class="space-y-3 min-h-[60px]"></div>
                </div>
                <div class="bg-surface-container-low rounded-xl p-4 space-y-3">
                    <h3 class="font-label-md text-on-surface-variant px-2 text-sm">지원 완료 <span id="count-submitted">(0)</span></h3>
                    <div id="col-submitted" class="space-y-3 min-h-[60px]"></div>
                </div>
                <div class="bg-surface-container-low rounded-xl p-4 space-y-3">
                    <h3 class="font-label-md text-on-surface-variant px-2 text-sm">면접 <span id="count-interview">(0)</span></h3>
                    <div id="col-interview" class="space-y-3 min-h-[60px]"></div>
                </div>
                <div class="bg-surface-container-low rounded-xl p-4 space-y-3">
                    <h3 class="font-label-md text-on-surface-variant px-2 text-sm">결과 <span id="count-result">(0)</span></h3>
                    <div id="col-result" class="space-y-3 min-h-[60px]"></div>
                </div>
            </div>
        </div>

        <!-- 면접 일정 (1/3) -->
        <!-- [수정 2026-06-25] 다가오는 인터뷰: 하드코딩 제거, API 연동 추가 -->
        <!-- [이전 코드 주석 - 하드코딩 인터뷰 시작]
        <section class="bg-surface-container-lowest ...">Kakao 1차 면접 / Toss 2차 면접 하드코딩</section>
        [이전 코드 주석 - 하드코딩 인터뷰 끝] -->
        <div class="bg-surface-container-lowest rounded-xl p-6 shadow-sm border border-border-subtle">
            <div class="flex justify-between items-center mb-4">
                <span class="font-label-md text-on-surface-variant">면접 일정</span>
            </div>
            <div id="interview-list" class="space-y-4">
                <p class="text-body-sm text-on-surface-variant text-center py-4" id="interview-empty">면접 일정이 없습니다.</p>
            </div>
        </div>

    </div>
</section>

<!-- [이전 코드] 바로가기 카드 — 네비게이션 메뉴와 중복으로 제거 (2026-06-25)
<section class="bg-surface-container-lowest rounded-xl p-6 shadow-sm border border-border-subtle">
    <h3>바로가기</h3>
    새 이력서 등록 / 이력서 관리 / 커리어 관리 / 내 프로필
</section>
-->

<!-- [이전 코드] 빠른 작업 카드 — 네비게이션 메뉴·상단 버튼과 중복으로 제거 (2026-06-25)
<div class="bg-surface-container-lowest ...">
    <h3>빠른 작업</h3>
    새 이력서 작성 / 프로필 정보 업데이트
</div>
-->

</main>
<!-- Footer -->
{% include '_footer.html' %}
<script src="common.js"></script>
<script>
    // ── 네비게이션 인증 상태 + 웰컴 이름 동적 표시 ───────────────
    (async function updateNavAuth() {
        try {
            const r = await fetch('/api/auth/me', { credentials: 'same-origin' });
            if (r.status === 401) {
                window.location.href = 'login.html?next=dashboard.html';
                return;
            }
            const data = await r.json();
            if (data.success && data.user) {
                const u = data.user;
                // 웰컴 메시지 이름 삽입
                const welcomeNameEl = document.getElementById('dashboard-user-name');
                if (welcomeNameEl) welcomeNameEl.textContent = u.name + '님';
                // 네비게이션 프로필 이름 삽입
                const profileLink = document.querySelector('a[href="profile-menu.html"]');
                if (profileLink) {
                    const nameEl = document.createElement('span');
                    nameEl.className = 'hidden sm:block text-sm font-semibold text-on-surface truncate max-w-[80px]';
                    nameEl.textContent = u.name;
                    profileLink.parentNode.insertBefore(nameEl, profileLink);
                }
                // 네비게이션 아바타 적용
                if (u.avatar_url) {
                    const img  = document.getElementById('nav-avatar-img');
                    const icon = document.getElementById('nav-avatar-icon');
                    if (img)  { img.src = u.avatar_url; img.classList.remove('hidden'); }
                    if (icon) icon.classList.add('hidden');
                }
            }
        } catch (_) {}
    })();

    // ── 알림 버튼 ──────────────────────────────────────────────────
    document.querySelectorAll('button').forEach(btn => {
        const icon = btn.querySelector('.material-symbols-outlined');
        if (icon && icon.textContent.trim() === 'notifications') {
            btn.addEventListener('click', handleUnavailableFeature);
        }
        if (icon && icon.textContent.trim() === 'filter_list') {
            btn.addEventListener('click', handleUnavailableFeature);
        }
    });

    // ── "새로 추가" 버튼 ───────────────────────────────────────────
    const btnAddApp = document.getElementById('btn-add-application');
    if (btnAddApp) {
        btnAddApp.addEventListener('click', handleUnavailableFeature);
    }

    // ── 풋터 링크 ──────────────────────────────────────────────────
    document.querySelectorAll('footer a[href="#"]').forEach(a => {
        a.addEventListener('click', e => { e.preventDefault(); handleUnavailableFeature(); });
    });

    // [이전 코드] 이력서 관련 버튼·통계·목록 — 이력서 카드 제거로 함께 제거 (2026-06-25)
    // btnNewResume → select.html 이동 (이력서 등록 메뉴로 대체)
    // btnImprove   → builder.html 이동 (이력서 관리 메뉴로 대체)
    // loadStats()  → /api/stats (이력서 수·지원 수 통계, 이력서 카드 제거로 불필요)
    // loadResumes() → /api/resumes (이력서 목록, 이력서 관리 메뉴로 이동)

    // ── [수정 2026-06-25] 지원 현황 칸반 API 연동 ─────────────────
    // 본인 지원 데이터만 표시 (샘플 없음)
    (async function loadApplications() {
        const loadingEl = document.getElementById('kanban-loading');
        const emptyEl   = document.getElementById('kanban-empty');
        const boardEl   = document.getElementById('kanban-board');
        try {
            const r = await fetch('/api/applications', { credentials: 'same-origin' });
            const data = await r.json();
            if (loadingEl) loadingEl.classList.add('hidden');
            if (!data.success) return;
            const apps = data.applications || [];
            if (!apps.length) {
                if (emptyEl) emptyEl.classList.remove('hidden');
                return;
            }

            // 상태별 분류
            const STATUS_MAP = {
                'draft':     'draft',
                'submitted': 'submitted',
                'interview': 'interview',
                'accepted':  'result',
                'rejected':  'result',
                'offer':     'result',
            };
            const buckets = { draft: [], submitted: [], interview: [], result: [] };
            apps.forEach(app => {
                const bucket = STATUS_MAP[app.status] || 'draft';
                buckets[bucket].push(app);
            });

            // 카운트 업데이트
            document.getElementById('count-draft').textContent     = `(${buckets.draft.length})`;
            document.getElementById('count-submitted').textContent = `(${buckets.submitted.length})`;
            document.getElementById('count-interview').textContent = `(${buckets.interview.length})`;
            document.getElementById('count-result').textContent    = `(${buckets.result.length})`;

            // 카드 렌더링
            const STATUS_LABELS = {
                draft: '초안', submitted: '지원 완료', interview: '면접', accepted: '합격', rejected: '불합격', offer: '오퍼'
            };
            function renderCard(app) {
                const statusLabel = STATUS_LABELS[app.status] || app.status;
                const isOffer     = app.status === 'offer' || app.status === 'accepted';
                const cardClass   = isOffer
                    ? 'kanban-card bg-green-50 rounded-lg p-4 shadow-sm border border-green-200'
                    : 'kanban-card bg-surface-container-lowest rounded-lg p-4 shadow-sm border border-border-subtle';
                const div = document.createElement('div');
                div.className = cardClass;
                div.innerHTML = `
                    <h4 class="font-label-md text-on-background truncate">${app.position || '직책 미입력'}</h4>
                    <p class="text-body-sm text-on-surface-variant">${app.company || '회사 미입력'}</p>
                    <div class="mt-2 pt-2 border-t border-border-subtle flex items-center justify-between">
                        <span class="text-xs px-2 py-0.5 rounded-full bg-surface-container font-semibold text-on-surface-variant">${statusLabel}</span>
                        ${app.applied_date ? `<span class="text-xs text-outline">${app.applied_date}</span>` : ''}
                    </div>
                `;
                return div;
            }

            if (boardEl) boardEl.classList.remove('hidden');
            Object.entries(buckets).forEach(([key, list]) => {
                const col = document.getElementById('col-' + key);
                if (!col) return;
                list.forEach(app => col.appendChild(renderCard(app)));
            });

            // 면접 일정 (interview 상태인 항목만 오른쪽 패널에 표시)
            const interviewListEl = document.getElementById('interview-list');
            const interviewEmptyEl = document.getElementById('interview-empty');
            const interviews = apps.filter(a => a.status === 'interview');
            if (interviewListEl && interviews.length) {
                if (interviewEmptyEl) interviewEmptyEl.classList.add('hidden');
                interviews.forEach(app => {
                    const item = document.createElement('div');
                    item.className = 'flex items-center gap-3 p-3 bg-surface-container-low rounded-lg';
                    item.innerHTML = `
                        <div class="w-10 h-10 bg-primary-fixed text-primary rounded-lg flex items-center justify-center shrink-0">
                            <span class="material-symbols-outlined text-sm">work</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="font-label-md text-on-background truncate">${app.company} 면접</p>
                            <p class="text-body-sm text-on-surface-variant truncate">${app.position || ''}</p>
                        </div>
                    `;
                    interviewListEl.appendChild(item);
                });
            }

        } catch (_) {
            if (loadingEl) loadingEl.classList.add('hidden');
            if (emptyEl) emptyEl.classList.remove('hidden');
        }
    })();
</script>
</body></html>
